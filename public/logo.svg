<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
    <defs>
        <linearGradient id="brick-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#34d399" />
            <stop offset="100%" stop-color="#047857" />
        </linearGradient>
        <linearGradient id="brick-dark" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#10b981" />
            <stop offset="100%" stop-color="#064e3b" />
        </linearGradient>
        <linearGradient id="arrow-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#6ee7b7" />
            <stop offset="100%" stop-color="#10b981" />
        </linearGradient>
    </defs>

    <!-- bottom row: 3 bricks -->
    <rect x="6"  y="46" width="16" height="12" rx="2" fill="url(#brick-dark)" />
    <rect x="24" y="46" width="16" height="12" rx="2" fill="url(#brick-grad)" />
    <rect x="42" y="46" width="16" height="12" rx="2" fill="url(#brick-dark)" />

    <!-- middle row: 2 bricks -->
    <rect x="15" y="32" width="16" height="12" rx="2" fill="url(#brick-grad)" />
    <rect x="33" y="32" width="16" height="12" rx="2" fill="url(#brick-dark)" />

    <!-- top: 1 brick -->
    <rect x="24" y="18" width="16" height="12" rx="2" fill="url(#brick-grad)" />

    <!-- arrow shooting up -->
    <path d="M32 2 L24 12 L29 12 L29 18 L35 18 L35 12 L40 12 Z" fill="url(#arrow-grad)" />
</svg>
